server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-Proxy zum Backend über das Docker-Compose-Netzwerk, damit die
    # Web-App und die API auf derselben Origin laufen (kein CORS nötig,
    # keine eigene API-Subdomain erforderlich). Siehe docs/SELF-HOSTING.md.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
