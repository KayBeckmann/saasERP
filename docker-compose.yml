services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      APP_KUNDE_URL: ${APP_KUNDE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"

  app_user:
    build:
      context: .
      dockerfile: app_user/Dockerfile
      args:
        # Eigene Origin je App (Pfad-Proxy /api/ in app_user/nginx.conf),
        # damit User-App und Kunden-App auf getrennten Domains laufen können,
        # ohne dass CORS konfiguriert werden muss. Fällt auf API_BASE_URL
        # zurück, falls nur eine gemeinsame Domain genutzt wird (z. B. lokal).
        API_BASE_URL: ${API_BASE_URL_USER:-${API_BASE_URL}}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_USER_PORT}:80"

  app_kunde:
    build:
      context: .
      dockerfile: app_kunde/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL_KUNDE:-${API_BASE_URL}}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_KUNDE_PORT}:80"

  # Backup-Dienst: einmaliger pg_dump-Container, über Docker-Compose-Profile
  # aktiviert. Manuell: docker-compose --profile backup run --rm backup
  # Per Cron (empfohlen, täglich 03:00 Uhr):
  #   0 3 * * * cd /home/kay/git/saasERP && docker-compose --profile backup run --rm backup
  backup:
    image: postgres:16-alpine
    profiles: [backup]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "/backup.sh"]

volumes:
  postgres_data:
  backup_data:
